    <script src="./js/vendors/footable/footable.js"></script>

    <script>
      function makeFootable() {
        $(".footable").footable();
      }

      function makeTooltips() {
        $('[data-toggle="tooltip"]').tooltip();
      }

      document.addEventListener("change", function (e) {
        const input = e.target;
        if (input.type !== "checkbox") return;

        const table = input.closest("table");
        if (!table) return;

        if (input.closest("thead")) {
          table
            .querySelectorAll('tbody input[type="checkbox"]')
            .forEach((cb) => {
              cb.checked = input.checked;
            });
        }

        const anyChecked =
          table.querySelectorAll('tbody input[type="checkbox"]:checked')
            .length > 0;
        const deleteBtn = document.getElementById("delete-school");
        if (deleteBtn) deleteBtn.classList.toggle("disabled", !anyChecked);
      });
    </script>
